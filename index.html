<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击变色的小球</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            overflow: hidden;
            cursor: pointer; /* 提醒用户这里可以点击 */
        }

        .ball {
            width: 80px;
            height: 80px;
            /* 初始颜色 */
            background: radial-gradient(circle at 30% 30%, #ff4757, #ff6b81);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            
            animation: bounce 0.6s cubic-bezier(0.5, 0.05, 1, 0.5) infinite alternate;
            transition: background 0.3s ease; /* 让颜色变化更平滑 */
        }

        @keyframes bounce {
            from { transform: translateY(-150px); }
            to { transform: translateY(100px) scaleY(0.8); }
        }
    </style>
</head>
<body>

    <div class="ball" id="myBall"></div>

    <script>
        // 1. 获取小球元素
        const ball = document.getElementById('myBall');

        // 2. 编写改变颜色的函数
        function changeColor() {
            // 随机生成三个 0-255 之间的数字作为 RGB 颜色
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            // 将新的颜色应用到小球的背景上
            // 我们使用 radial-gradient 保持球体的立体感
            ball.style.background = `radial-gradient(circle at 30% 30%, rgb(${r},${g},${b}), rgb(${r-40},${g-40},${b-40}))`;
        }

        // 3. 监听点击事件
        // 无论是点击小球还是页面任何地方，都会触发变色
        window.addEventListener('click', changeColor);
    </script>
</body>
</html>
