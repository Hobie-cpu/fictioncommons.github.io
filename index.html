<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写作</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #ffffff;
      color: #37352f;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
      -webkit-font-smoothing: antialiased;
    }

    .page {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 48px 24px 100px;
      max-width: 720px;
      margin: 0 auto;
    }

    #editor {
      flex: 1;
      width: 100%;
      min-height: 60vh;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #37352f;
      font-size: 17px;
      line-height: 1.65;
      caret-color: #37352f;
    }

    #editor::placeholder {
      color: rgba(55, 53, 47, 0.35);
    }

    .dock {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: calc(100% - 48px);
      max-width: 680px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(55, 53, 47, 0.09);
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(15, 15, 15, 0.06);
      backdrop-filter: blur(8px);
    }

    .word-count {
      font-size: 13px;
      color: rgba(55, 53, 47, 0.65);
      letter-spacing: 0.02em;
      user-select: none;
    }

    .word-count strong {
      font-weight: 600;
      color: #37352f;
    }

    #beautify {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 13px;
      font-family: inherit;
      color: #37352f;
      background: #f7f6f3;
      border: 1px solid rgba(55, 53, 47, 0.12);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #beautify:hover {
      background: #efedea;
      border-color: rgba(55, 53, 47, 0.2);
    }

    #beautify:active {
      background: #e8e6e3;
    }
  </style>
</head>
<body>
  <div class="page">
    <textarea
      id="editor"
      placeholder="开始写作…"
      spellcheck="false"
    ></textarea>
  </div>

  <div class="dock" role="toolbar" aria-label="写作工具">
    <div class="word-count" id="countLabel" aria-live="polite">
      字数：<strong id="countNum">0</strong>
    </div>
    <button type="button" id="beautify">一键美化排版</button>
  </div>

  <script>
    (function () {
      var editor = document.getElementById("editor");
      var countNum = document.getElementById("countNum");
      var beautifyBtn = document.getElementById("beautify");

      function getCharCount(text) {
        return text.length;
      }

      function updateCount() {
        countNum.textContent = String(getCharCount(editor.value));
      }

      function beautifyText(text) {
        var lines = text.split("\n");
        var trimmedLines = [];
        for (var i = 0; i < lines.length; i++) {
          trimmedLines.push(lines[i].replace(/[ \t]+$/g, ""));
        }
        var joined = trimmedLines.join("\n");
        joined = joined.replace(/\n{3,}/g, "\n\n");
        return joined.replace(/^\s+|\s+$/g, "");
      }

      editor.addEventListener("input", updateCount);
      editor.addEventListener("paste", function () {
        requestAnimationFrame(updateCount);
      });

      beautifyBtn.addEventListener("click", function () {
        editor.value = beautifyText(editor.value);
        updateCount();
        editor.focus();
      });

      updateCount();
    })();
  </script>
</body>
</html>
