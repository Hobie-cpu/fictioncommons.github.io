<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的网站</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #eaeaea;
        }

        /* 顶部导航栏 */
        nav {
            background: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #ccc;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: white;
        }

        /* 主体 */
        .container {
            text-align: center;
            padding: 80px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #444;
            color: #fff;
            text-decoration: none;
        }

        .btn:hover {
            background: radial-gradient(circle, #0f2027, #000000);
        }
    </style>
</head>

<body>

    <nav>
        <a href="#">首页</a>
        <a href="about.html">关于</a>
        <a href="#">作品</a>
    </nav>

    <div class="container">
        <h1>我的网站</h1>
        <p>这是我亲手搭建的第一个网页</p>
        <img src="https://picsum.photos/800/400">

        <a class="btn" href="#">进入内容</a>
    </div>

</body>
</html>
